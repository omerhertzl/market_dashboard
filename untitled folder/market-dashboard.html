<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח מחוונים שוקי ההון</title>
<style>
:root{color-scheme:light}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a202c;direction:rtl;min-height:100vh;font-size:13px}

.hdr{background:#1a202c;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:15px;font-weight:700;color:#fff}
.hdr-r{display:flex;align-items:center;gap:8px}
.upd{font-size:11px;color:#a0aec0}
.btn-sm{background:#2d3748;border:none;border-radius:5px;padding:5px 10px;color:#90cdf4;font-size:11px;cursor:pointer}
.btn-sm:hover{background:#4a5568}

.tabs{background:#fff;border-bottom:2px solid #e2e8f0;display:flex;padding:0 12px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:3px solid transparent;padding:9px 13px;color:#718096;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;margin-bottom:-2px;transition:color .15s,border-color .15s}
.tab:hover{color:#2d3748}
.tab.on{color:#2563eb;border-bottom-color:#2563eb}

.body{padding:14px;max-width:1100px;margin:0 auto}
.pane{display:none}.pane.on{display:block}

.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px;gap:10px;color:#718096}
.spin{width:26px;height:26px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.stitle{font-size:10.5px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.6px;margin:18px 0 7px;padding-bottom:5px;border-bottom:1px solid #e2e8f0}
.stitle:first-child{margin-top:0}

table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.07);margin-bottom:4px}
th{background:#f7fafc;color:#718096;font-weight:700;font-size:10.5px;padding:7px 9px;text-align:right;border-bottom:1px solid #edf2f7;white-space:nowrap}
td{padding:6px 9px;border-bottom:1px solid #f7fafc;text-align:right;color:#2d3748;font-size:12px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7fafc}
.nm{font-weight:600;color:#1a202c}
.tk{font-family:monospace;font-size:11px;color:#4a5568}

.pos{color:#16a34a;font-weight:600}
.neg{color:#dc2626;font-weight:600}
.neu{color:#9ca3af}

/* News */
.ncards{display:grid;gap:7px}
.nc{background:#fff;border:1px solid #e2e8f0;border-radius:7px;padding:10px 13px;cursor:pointer;transition:border-color .15s;text-decoration:none;display:block;color:inherit}
.nc:hover{border-color:#93c5fd}
.nh{font-size:12.5px;font-weight:600;color:#1a202c;margin-bottom:5px;line-height:1.4}
.nm2{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.ntime{font-size:10.5px;color:#9ca3af}
.nsrc{font-size:10px;color:#718096;background:#f7fafc;padding:1px 5px;border-radius:3px;font-weight:600}
.sent{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:700}
.sP{background:#dcfce7;color:#16a34a}
.sN{background:#fee2e2;color:#dc2626}
.sU{background:#f7fafc;color:#9ca3af}

.frow{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap}
.fb{background:#fff;border:1.5px solid #e2e8f0;border-radius:5px;padding:3px 10px;color:#718096;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
.fb:hover{border-color:#93c5fd;color:#2563eb}
.fb.on{background:#eff6ff;border-color:#2563eb;color:#2563eb}

.sbar{display:flex;gap:7px;margin-bottom:14px;align-items:center}
.sinp{flex:1;max-width:300px;background:#fff;border:1.5px solid #e2e8f0;border-radius:6px;padding:7px 11px;color:#1a202c;font-size:13px;text-align:right;outline:none;transition:border-color .15s}
.sinp:focus{border-color:#2563eb}
.sbtn{background:#2563eb;border:none;border-radius:6px;padding:7px 16px;color:#fff;font-size:13px;cursor:pointer;font-weight:700}
.sbtn:hover{background:#1d4ed8}

.err{background:#fff5f5;border:1px solid #fed7d7;border-radius:6px;padding:9px 13px;color:#c53030;font-size:12px;margin-bottom:8px}

/* ─── Company Infographic Card ─── */
.co-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:16px}
.co-hdr{background:linear-gradient(135deg,#1a202c 0%,#2d3748 100%);padding:16px 18px;color:#fff}
.co-hdr-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.co-name{font-size:18px;font-weight:700;margin-bottom:4px}
.co-badges{display:flex;gap:5px;flex-wrap:wrap}
.co-badge{background:rgba(255,255,255,.15);border-radius:4px;padding:2px 8px;font-size:10.5px;font-weight:600;color:#e2e8f0}
.co-price-block{text-align:left}
.co-price{font-size:28px;font-weight:800;color:#fff}
.co-chg{font-size:13px;font-weight:700;margin-top:2px}
.co-chg.up{color:#6ee7b7}
.co-chg.dn{color:#fca5a5}
.co-mktcap{font-size:11px;color:#a0aec0;margin-top:2px}

/* Performance timeline */
.co-perf{padding:14px 18px;border-bottom:1px solid #f1f5f9}
.co-perf-title{font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.co-perf-bars{display:flex;gap:6px;align-items:flex-end;height:70px}
.co-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.co-bar-outer{width:100%;display:flex;flex-direction:column;justify-content:flex-end;height:50px}
.co-bar{border-radius:3px 3px 0 0;min-height:4px;transition:height .3s}
.co-bar.pos-b{background:#16a34a}
.co-bar.neg-b{background:#dc2626}
.co-bar-lbl{font-size:9px;color:#718096;font-weight:600;text-align:center;white-space:nowrap}
.co-bar-val{font-size:9.5px;font-weight:700;text-align:center}

/* 52W range */
.co-range-wrap{padding:12px 18px;border-bottom:1px solid #f1f5f9}
.co-range-title{font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.co-range-track{position:relative;height:8px;background:#e2e8f0;border-radius:4px;margin:8px 0}
.co-range-fill{position:absolute;height:100%;background:linear-gradient(90deg,#dc2626,#f59e0b,#16a34a);border-radius:4px}
.co-range-dot{position:absolute;width:14px;height:14px;background:#2563eb;border:2px solid #fff;border-radius:50%;top:-3px;transform:translateX(-50%);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.co-range-labels{display:flex;justify-content:space-between;font-size:10.5px;color:#718096}
.co-range-labels span{font-weight:600}
.co-range-current{text-align:center;font-size:10px;color:#2563eb;font-weight:700;margin-top:2px}

/* Metrics grid */
.co-metrics{padding:14px 18px;border-bottom:1px solid #f1f5f9;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.co-metric{background:#f8fafc;border-radius:6px;padding:8px 10px;text-align:center}
.co-metric-lbl{font-size:9.5px;color:#718096;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
.co-metric-val{font-size:14px;font-weight:800;color:#1a202c}

/* Analyst */
.co-analyst{padding:14px 18px;border-bottom:1px solid #f1f5f9}
.co-analyst-row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.co-consensus{text-align:center;min-width:80px}
.co-consensus-badge{display:inline-block;background:#dcfce7;color:#16a34a;font-weight:800;font-size:14px;padding:4px 14px;border-radius:20px;margin-bottom:4px}
.co-consensus-badge.Sell{background:#fee2e2;color:#dc2626}
.co-consensus-badge.Hold{background:#fef9c3;color:#854d0e}
.co-consensus-lbl{font-size:10px;color:#718096}
.co-dist{flex:1;min-width:180px}
.co-dist-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.co-dist-lbl{font-size:10.5px;font-weight:600;width:70px;text-align:right}
.co-dist-bar-bg{flex:1;height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden}
.co-dist-bar-fill{height:100%;border-radius:5px;transition:width .4s}
.co-dist-cnt{font-size:10px;color:#718096;min-width:16px;text-align:left}
.co-pt{min-width:110px;text-align:center;background:#eff6ff;border-radius:8px;padding:10px}
.co-pt-lbl{font-size:9.5px;color:#718096;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.co-pt-val{font-size:18px;font-weight:800;color:#2563eb}
.co-pt-upside{font-size:10px;font-weight:700;color:#16a34a;margin-top:2px}

/* Earnings beat */
.co-earnings-wrap{padding:14px 18px;border-bottom:1px solid #f1f5f9}
.co-earnings-row{display:flex;gap:10px;flex-wrap:wrap}
.co-earn-box{flex:1;min-width:130px;background:#f8fafc;border-radius:8px;padding:10px 12px;border-right:3px solid #16a34a}
.co-earn-box.miss{border-right-color:#dc2626}
.co-earn-title{font-size:10px;color:#718096;font-weight:700;text-transform:uppercase;margin-bottom:6px}
.co-earn-actual{font-size:16px;font-weight:800;color:#1a202c}
.co-earn-est{font-size:10.5px;color:#718096;margin-top:2px}
.co-earn-surp{font-size:11px;font-weight:700;margin-top:3px}

/* Next earnings */
.co-next{display:inline-flex;align-items:center;gap:8px;background:#eff6ff;border-radius:8px;padding:8px 14px;margin-top:8px}
.co-next-days{font-size:20px;font-weight:800;color:#2563eb}
.co-next-info{font-size:11px;color:#4a5568;line-height:1.4}

/* Revenue bars */
.co-rev-wrap{padding:14px 18px;border-bottom:1px solid #f1f5f9}
.co-rev-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.co-rev-lbl{font-size:11px;color:#4a5568;font-weight:600;width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right}
.co-rev-bar-bg{flex:1;height:14px;background:#f1f5f9;border-radius:7px;overflow:hidden}
.co-rev-bar-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:7px;transition:width .4s}
.co-rev-val{font-size:10.5px;font-weight:700;color:#4a5568;min-width:55px;text-align:left}

/* ESG */
.co-esg{padding:12px 18px;display:flex;gap:10px;flex-wrap:wrap}
.co-esg-box{flex:1;min-width:70px;text-align:center;background:#f8fafc;border-radius:6px;padding:8px}
.co-esg-lbl{font-size:9.5px;color:#718096;font-weight:600;text-transform:uppercase;margin-bottom:3px}
.co-esg-score{font-size:16px;font-weight:800;color:#16a34a}
.co-esg-class{font-size:9px;color:#16a34a;font-weight:700}

/* ─── Events Calendar Infographic ─── */
.evt-summary-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.evt-stat-pill{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:6px 14px;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:#4a5568;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.evt-stat-pill span{font-size:17px;font-weight:800;color:#1a202c}
.evt-stat-pill.e-type{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}
.evt-stat-pill.e-conf{border-color:#e9d5ff;background:#faf5ff;color:#7c3aed}
.evt-stat-pill.e-eco{border-color:#d1fae5;background:#f0fdf4;color:#15803d}

.evt-date-section{margin-bottom:16px}
.evt-date-label{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.evt-date-chip{background:#1a202c;color:#fff;border-radius:20px;padding:4px 14px;font-size:11.5px;font-weight:700;display:inline-block}
.evt-date-chip.today{background:#2563eb}
.evt-date-chip.tomorrow{background:#7c3aed}
.evt-date-sep{flex:1;height:1px;background:#e2e8f0}

.evt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px}
.evt-item{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:11px 13px;position:relative;overflow:hidden;transition:box-shadow .15s;cursor:default}
.evt-item:hover{box-shadow:0 3px 10px rgba(0,0,0,.1)}
.evt-item::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 10px 10px 0}
.evt-item.earn::before{background:#2563eb}
.evt-item.conf::before{background:#7c3aed}
.evt-item.eco::before{background:#16a34a}
.evt-type-badge{display:inline-block;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;border-radius:4px;padding:1px 6px;margin-bottom:6px}
.evt-item.earn .evt-type-badge{background:#dbeafe;color:#1d4ed8}
.evt-item.conf .evt-type-badge{background:#ede9fe;color:#6d28d9}
.evt-item.eco .evt-type-badge{background:#dcfce7;color:#15803d}
.evt-co-name{font-size:12.5px;font-weight:700;color:#1a202c;line-height:1.3;margin-bottom:3px}
.evt-ticker{display:inline-block;font-size:10px;font-family:monospace;background:#f1f5f9;color:#4a5568;border-radius:3px;padding:1px 5px;margin-bottom:5px;font-weight:700}
.evt-meta{display:flex;flex-direction:column;gap:2px}
.evt-period-tag{font-size:10px;color:#718096;font-weight:600}
.evt-time-tag{font-size:9.5px;color:#9ca3af}
.evt-est-tag{font-size:9.5px;background:#fef9c3;color:#854d0e;border-radius:3px;padding:1px 5px;display:inline-block;margin-top:2px;font-weight:700}

/* Debug */
#dbgtgl{position:fixed;bottom:12px;left:12px;z-index:1000;background:#4a5568;border:none;border-radius:5px;padding:4px 9px;color:#fff;font-size:10px;cursor:pointer;opacity:.5}
#dbgtgl:hover{opacity:1}
#dbg{position:fixed;bottom:40px;left:12px;z-index:999;background:#fff;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:12px;max-width:440px;max-height:320px;overflow:auto;display:none;font-size:10px;direction:ltr;text-align:left}
#dbg pre{white-space:pre-wrap;word-break:break-all;margin-top:6px;color:#4a5568}
</style>
</head>
<body>

<div class="hdr">
  <h1>📊 לוח מחוונים שוקי ההון</h1>
  <div class="hdr-r">
    <span class="upd" id="upd">טוען…</span>
    <button class="btn-sm" onclick="loadAll()">↻ רענן</button>
  </div>
</div>

<div class="tabs">
  <button class="tab on"  data-t="idx">🌍 מדדים</button>
  <button class="tab"     data-t="sec">📊 סקטורים</button>
  <button class="tab"     data-t="cry">₿ קריפטו</button>
  <button class="tab"     data-t="fx">💱 פורקס</button>
  <button class="tab"     data-t="com">🛢️ סחורות</button>
  <button class="tab"     data-t="nws">📰 חדשות</button>
  <button class="tab"     data-t="evt">📅 אירועים</button>
  <button class="tab"     data-t="stk">🔍 מניות</button>
</div>

<div class="body">
  <div class="pane on" id="p-idx"><div class="spin-wrap" id="l-idx"><div class="spin"></div>טוען מדדים…</div><div id="c-idx" style="display:none"></div></div>
  <div class="pane" id="p-sec"><div class="spin-wrap" id="l-sec"><div class="spin"></div>טוען סקטורים…</div><div id="c-sec" style="display:none"></div></div>
  <div class="pane" id="p-cry"><div class="spin-wrap" id="l-cry"><div class="spin"></div>טוען קריפטו…</div><div id="c-cry" style="display:none"></div></div>
  <div class="pane" id="p-fx"><div class="spin-wrap" id="l-fx"><div class="spin"></div>טוען פורקס…</div><div id="c-fx" style="display:none"></div></div>
  <div class="pane" id="p-com"><div class="spin-wrap" id="l-com"><div class="spin"></div>טוען סחורות…</div><div id="c-com" style="display:none"></div></div>
  <div class="pane" id="p-nws">
    <div class="frow">
      <button class="fb on" data-f="all"    onclick="filterNews('all')">🔀 הכל</button>
      <button class="fb"    data-f="crypto" onclick="filterNews('crypto')">₿ קריפטו</button>
      <button class="fb"    data-f="stocks" onclick="filterNews('stocks')">📈 מניות</button>
      <button class="fb"    data-f="pos"    onclick="filterNews('pos')">🟢 חיובי</button>
      <button class="fb"    data-f="neg"    onclick="filterNews('neg')">🔴 שלילי</button>
    </div>
    <div class="spin-wrap" id="l-nws"><div class="spin"></div>טוען חדשות…</div>
    <div class="ncards" id="c-nws" style="display:none"></div>
  </div>
  <div class="pane" id="p-evt"><div class="spin-wrap" id="l-evt"><div class="spin"></div>טוען אירועים…</div><div id="c-evt" style="display:none"></div></div>
  <div class="pane" id="p-stk">
    <div class="sbar">
      <button class="sbtn" onclick="searchTicker()">🔍 חיפוש</button>
      <input class="sinp" id="tkin" placeholder="טיקר: AAPL, NVDA, TSLA, META…" onkeydown="if(event.key==='Enter')searchTicker()">
    </div>
    <div id="c-stk"><p style="color:#9ca3af;font-size:12px;padding:8px 0">הזן טיקר מניה לקבלת דוח מלא עם גרפיקה.</p></div>
  </div>
</div>

<button id="dbgtgl" onclick="toggleDbg()">dbg</button>
<div id="dbg"><strong>Debug</strong><pre id="dbgpre"></pre></div>

<script>
// ── API base — switch between local Netlify dev and production ────────────────
const API = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:8888/.netlify/functions/market-data'
  : '/.netlify/functions/market-data';

async function apiFetch(type, params = {}) {
  const url = new URL(API, location.href);
  url.searchParams.set('type', type);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString());
  const json = await res.json();
  if (!res.ok || json.error) throw new Error(json.message || 'HTTP ' + res.status);
  return json;
}
let allNews=[];
const logs=[];
function log(...a){const s=a.map(x=>typeof x==='object'?JSON.stringify(x).substring(0,300):String(x)).join(' ');logs.push(s);document.getElementById('dbgpre').textContent=logs.slice(-60).join('\n');}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.pane').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.getElementById('p-'+b.dataset.t).classList.add('on');
  });
});

// ── Response extractors ───────────────────────────────────────────────────────
function getText(raw){
  if(!raw) return '';
  if(typeof raw==='string') return raw;
  if(typeof raw.result==='string') return raw.result;
  if(Array.isArray(raw.content)&&raw.content[0]?.text){
    const t=raw.content[0].text;
    try{const j=JSON.parse(t);return typeof j.result==='string'?j.result:JSON.stringify(j);}catch{return t;}
  }
  if(Array.isArray(raw)&&typeof raw[0]==='string') return raw[0];
  return JSON.stringify(raw);
}
function getCompanies(raw){
  if(!raw) return [];
  if(Array.isArray(raw.result)) return raw.result;
  if(Array.isArray(raw)) return raw;
  const t=getText(raw);
  try{const j=JSON.parse(t);return Array.isArray(j)?j:Array.isArray(j.result)?j.result:[];}catch{return [];}
}
function getArr(raw,key){
  if(!raw) return [];
  if(Array.isArray(raw)) return raw;
  if(raw[key]&&Array.isArray(raw[key])) return raw[key];
  const t=getText(raw);
  try{const j=JSON.parse(t);return Array.isArray(j[key])?j[key]:Array.isArray(j)?j:[];}catch{return [];}
}

// ── Markdown helpers ─────────────────────────────────────────────────────────
function sec2(md,h2){
  const tag='\n## '+h2+'\n';
  let i=md.indexOf(tag);
  if(i===-1){if(md.startsWith('## '+h2+'\n')){i=-1;}else return '';}
  const from=i===-1?0:md.indexOf('\n',i)+1;
  const after=md.slice(from);
  // consume the heading line
  const bodyStart=after.indexOf('\n')+1;
  const body=after.slice(bodyStart);
  const nxt=body.indexOf('\n## ');
  return nxt===-1?body:body.slice(0,nxt);
}
function sec3(block,h3){
  const tag='\n### '+h3+'\n';
  const i=block.indexOf(tag);
  if(i===-1) return '';
  const from=block.indexOf('\n',i+1)+1;
  const body=block.slice(from);
  const e1=body.indexOf('\n### '),e2=body.indexOf('\n## ');
  let end=body.length;
  if(e1!==-1) end=Math.min(end,e1);
  if(e2!==-1) end=Math.min(end,e2);
  return body.slice(0,end);
}
function parseTbl(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('|')&&l.length>2);
  if(lines.length<3) return [];
  const hdrs=lines[0].split('|').slice(1,-1).map(h=>h.trim());
  const rows=[];
  for(let i=2;i<lines.length;i++){
    const cells=lines[i].split('|').slice(1,-1).map(c=>c.trim());
    if(!cells.length||cells.every(c=>!c||/^[-:]+$/.test(c))) continue;
    const row={};hdrs.forEach((h,j)=>{row[h]=cells[j]||'';});rows.push(row);
  }
  return rows;
}
// Extract "**Label:** Value" pattern
function exBold(md,label){
  const re=new RegExp('\\*\\*'+label+':\\*\\*\\s*([^\\n\\*]+)','i');
  const m=md.match(re);return m?m[1].trim():'';
}
// Extract "- **Label:** Value" pattern
function exList(md,label){
  const re=new RegExp('-\\s+\\*\\*'+label+':\\*\\*\\s*([^\\n]+)','i');
  const m=md.match(re);return m?m[1].trim():'';
}

// ── Render helpers ────────────────────────────────────────────────────────────
function pct(s){
  if(!s||s==='–') return '<span class="neu">–</span>';
  const v=parseFloat(s.replace(/[+%,]/g,''));
  if(isNaN(v)) return `<span class="neu">${s}</span>`;
  return `<span class="${v>0?'pos':v<0?'neg':'neu'}">${v>0?'+':''}${v.toFixed(2)}%</span>`;
}
function mkTbl(rows,cols){
  if(!rows||!rows.length) return '<p style="color:#9ca3af;padding:10px 0">אין נתונים</p>';
  let h='<table><thead><tr>';
  cols.forEach(c=>{h+=`<th>${c.l}</th>`;});
  h+='</tr></thead><tbody>';
  rows.forEach(r=>{h+='<tr>';cols.forEach(c=>{const v=r[c.k]||'';h+=`<td class="${c.c||''}">${c.p?pct(v):v}</td>`;});h+='</tr>';});
  return h+'</tbody></table>';
}

function todayPlus(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function fmtTs(ts){return new Date(ts*1000).toLocaleString('he-IL',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}

// ── Events calendar ───────────────────────────────────────────────────────────
function renderEvt(mdText, raw){
  let events = [];
  try {
    // 1. Try object arrays
    if(typeof raw === 'object' && raw !== null){
      for(const key of ['events','earnings','items','data','results']){
        if(Array.isArray(raw[key]) && raw[key].length){
          events = raw[key].map(ev=>({
            co: ev.company_name||ev.name||ev.companyName||'—',
            tk: ev.ticker||ev.symbol||'',
            dt: ev.date||ev.release_date||ev.releaseDate||'',
            per: ev.period||ev.fiscal_period||'',
            time: ev.time||ev.call_time||'',
            type: 'earn'
          }));
          log('evt: array in raw.'+key, events.length);
          break;
        }
      }
    }

    // 2. Parse markdown tables
    if(!events.length && mdText && mdText.length > 50){
      const ei = mdText.indexOf('📊'), ci = mdText.indexOf('🎤');
      log('evt emoji: 📊=',ei,'🎤=',ci);

      if(ei !== -1){
        const slice = (ci > ei) ? mdText.slice(ei, ci) : mdText.slice(ei);
        parseTbl(slice).forEach(r=>{
          events.push({
            co:   r['COMPANY NAME']||r['Company Name']||r['NAME']||'—',
            tk:   r['TICKER']||r['Ticker']||'',
            dt:   r['RELEASE DATE']||r['Release Date']||r['DATE']||r['Date']||'',
            per:  r['PERIOD']||r['Period']||'',
            time: r['EARNINGS CALL TIME']||r['Time']||'',
            est:  r['EPS ESTIMATE']||r['Estimate']||'',
            type: 'earn'
          });
        });
      }
      if(ci !== -1){
        parseTbl(mdText.slice(ci)).forEach(r=>{
          events.push({
            co:   r['COMPANY NAME']||r['Company Name']||r['NAME']||'—',
            tk:   r['TICKER']||'',
            dt:   r['DATE']||r['Date']||'',
            per:  r['EVENT']||r['Event']||r['NAME']||'',
            time: r['TIME']||r['Time']||'',
            type: 'conf'
          });
        });
      }
      log('evt parsed:', events.length);
    }

    // 3. Fallback: try raw text lines that look like event data
    if(!events.length && mdText && mdText.length > 100){
      const lines = mdText.split('\n').filter(l=>l.includes('|'));
      if(lines.length > 2){
        // Try general table parse on full md
        parseTbl(mdText).forEach(r=>{
          const keys = Object.keys(r);
          events.push({
            co:   r[keys.find(k=>/name|company/i.test(k))||keys[0]]||'—',
            tk:   r[keys.find(k=>/tick|sym/i.test(k))||'']||'',
            dt:   r[keys.find(k=>/date|when/i.test(k))||'']||'',
            per:  r[keys.find(k=>/period|qtr|quarter/i.test(k))||'']||'',
            time: '',
            type: 'earn'
          });
        });
        log('evt fallback parse:', events.length);
      }
    }

    document.getElementById('c-evt').innerHTML = buildEvtInfographic(events, mdText);
    show('evt');
  } catch(e){
    log('evt render err:', e.message);
    document.getElementById('c-evt').innerHTML = `<div class="err">שגיאה: ${e.message}</div>`;
    show('evt');
  }
}

function buildEvtInfographic(events, mdText){
  if(!events.length){
    // Last resort: show prettified raw text
    if(mdText && mdText.trim().length > 60){
      return `<div style="background:#fff;border-radius:10px;padding:16px;font-size:11.5px;color:#4a5568;line-height:1.8;box-shadow:0 1px 4px rgba(0,0,0,.07);white-space:pre-wrap;max-height:600px;overflow:auto">${mdText.replace(/</g,'&lt;').replace(/>/g,'&gt;').substring(0,4000)}</div>`;
    }
    return `<div style="background:#f8fafc;border-radius:10px;padding:30px;text-align:center;color:#9ca3af"><div style="font-size:32px;margin-bottom:8px">📅</div><div style="font-size:13px">אין אירועים קרובים ל-14 ימים הבאים</div></div>`;
  }

  const earnEvents = events.filter(e=>e.type==='earn');
  const confEvents = events.filter(e=>e.type==='conf');

  // Summary bar
  let html = `<div class="evt-summary-bar">
    <div class="evt-stat-pill"><span>${events.length}</span>אירועים קרובים</div>
    ${earnEvents.length?`<div class="evt-stat-pill e-type">📊 <span>${earnEvents.length}</span> דוחות כספיים</div>`:''}
    ${confEvents.length?`<div class="evt-stat-pill e-conf">🎤 <span>${confEvents.length}</span> כנסים</div>`:''}
  </div>`;

  // Group by date
  const byDate = {};
  events.forEach(ev=>{
    const key = ev.dt || 'תאריך לא ידוע';
    if(!byDate[key]) byDate[key]=[];
    byDate[key].push(ev);
  });

  // Sort dates
  const sortedDates = Object.keys(byDate).sort((a,b)=>{
    const da=new Date(a), db=new Date(b);
    if(isNaN(da)) return 1; if(isNaN(db)) return -1;
    return da-db;
  });

  const todayStr = new Date().toISOString().split('T')[0];
  const tomorrowStr = new Date(Date.now()+86400000).toISOString().split('T')[0];

  sortedDates.forEach(dateKey=>{
    const evList = byDate[dateKey];
    let chipClass = 'evt-date-chip';
    let dateLabel = dateKey;

    // Format date nicely
    const d = new Date(dateKey);
    if(!isNaN(d)){
      const iso = d.toISOString().split('T')[0];
      if(iso === todayStr){ chipClass += ' today'; dateLabel = '📍 היום — '+d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}); }
      else if(iso === tomorrowStr){ chipClass += ' tomorrow'; dateLabel = '⭐ מחר — '+d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'}); }
      else dateLabel = d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    }

    html += `<div class="evt-date-section">
      <div class="evt-date-label">
        <span class="${chipClass}">${dateLabel}</span>
        <div class="evt-date-sep"></div>
        <span style="font-size:10px;color:#9ca3af;white-space:nowrap">${evList.length} אירועים</span>
      </div>
      <div class="evt-grid">`;

    evList.forEach(ev=>{
      const typeLabel = ev.type==='earn'?'📊 דוח כספי':ev.type==='conf'?'🎤 כנס':'📅 אירוע';
      html += `<div class="evt-item ${ev.type||'earn'}">
        <div class="evt-type-badge">${typeLabel}</div>
        <div class="evt-co-name">${ev.co}</div>
        ${ev.tk?`<span class="evt-ticker">${ev.tk}</span>`:''}
        <div class="evt-meta">
          ${ev.per?`<span class="evt-period-tag">${ev.per}</span>`:''}
          ${ev.time?`<span class="evt-time-tag">🕐 ${ev.time}</span>`:''}
          ${ev.est?`<span class="evt-est-tag">תחזית EPS: ${ev.est}</span>`:''}
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  return html;
}

  const exch    = exBold(md,'Exchange');
  const ceo     = exBold(md,'CEO');
  const emp     = exBold(md,'Employees');

  // price changes
  const perfs = [
    {l:'1 יום',    v: exList(md,'1 Day')},
    {l:'5 ימים',   v: exList(md,'5 Days')},
    {l:'חודש',     v: exList(md,'1 Month')},
    {l:'3 חודשים', v: exList(md,'3 Months')},
    {l:'6 חודשים', v: exList(md,'6 Months')},
    {l:'מתח"ש',    v: exList(md,'YTD')},
    {l:'שנה',      v: exList(md,'1 Year')},
  ].filter(p=>p.v);

  // analyst — careful: "Consensus" appears in two sections, grab from recommendations block
  const recBlock = sec3(sec2(md,'Analyst Ratings & Price Targets'),'Recommendations Summary');
  const ptBlock  = sec3(sec2(md,'Analyst Ratings & Price Targets'),'Price Targets');
  const consensus = exBold(recBlock,'Consensus') || exBold(md,'Consensus');
  const strongBuy = parseInt(exList(recBlock,'Strong Buy')||'0');
  const buyN      = parseInt(exList(recBlock,'Buy')||'0');
  const holdN     = parseInt(exList(recBlock,'Hold')||'0');
  const sellN     = parseInt(exList(recBlock,'Sell')||'0');
  const strSell   = parseInt(exList(recBlock,'Strong Sell')||'0');
  const totalAn   = strongBuy+buyN+holdN+sellN+strSell||1;
  const ptCons    = exList(ptBlock,'Consensus');
  const ptHigh    = exList(ptBlock,'High');
  const ptLow     = exList(ptBlock,'Low');

  // earnings beat
  const epsBlk = sec3(sec2(md,'Latest Quarterly Earnings Release'),'EPS');
  const revBlk = sec3(sec2(md,'Latest Quarterly Earnings Release'),'Revenue');
  const epsAct  = exList(epsBlk,'Actual'); const epsEst = exList(epsBlk,'Estimated'); const epsSurp = exList(epsBlk,'Surprise');
  const revAct  = exList(revBlk,'Actual'); const revEst = exList(revBlk,'Estimated'); const revSurp = exList(revBlk,'Surprise');
  const repPer  = exBold(sec2(md,'Latest Quarterly Earnings Release'),'Reporting Period');

  // next earnings
  const nextBlk  = sec3(sec2(md,'Earnings Calendar'),'Next Earnings');
  const nextDate = exList(nextBlk,'Date'); const nextPer = exList(nextBlk,'Period'); const nextIn = exList(nextBlk,'In');

  // revenue by product
  const revProdBlk = sec3(sec2(md,'Revenue Segmentation'),'Revenue by Product');
  const revProdRows = parseTbl(revProdBlk);

  // ESG
  const esgBlk = sec2(md,'ESG Performance Scores');
  const esgRows = parseTbl(esgBlk);
  const esgCur  = esgRows.find(r=>r['Year']==='2026')||esgRows[0]||{};

  // key metrics
  const ratBlk = sec2(md,'Financial Ratios');
  const ratRows = parseTbl(ratBlk);
  const rat = ratRows[0]||{};
  const pe    = rat['P/E Ratio']||exBold(md,'P/E Ratio');
  const roe   = rat['Return on Equity']||esgBlk?exBold(md,'Return on Equity'):'';
  const npm   = rat['Net Profit Margin'];
  const evEbt = rat['EV/EBITDA'];
  const kmRows = parseTbl(sec2(md,'Key Metrics'));
  const km    = kmRows[0]||{};
  const roa   = km['Return on Assets'];
  const roic  = km['Return on Invested Capital'];
  const cr    = km['Current Ratio'];
  const wc    = km['Working Capital'];

  // change direction
  const chgV = parseFloat((chgPct||'').replace(/[+%,]/g,''));
  const isUp  = chgV > 0;

  // ── build HTML ──
  let html = `<div class="co-card">`;

  // Header
  html += `<div class="co-hdr">
    <div class="co-hdr-top">
      <div>
        <div class="co-name">${name}</div>
        <div class="co-badges">
          <span class="co-badge">${ticker}</span>
          ${sector?`<span class="co-badge">${sector}</span>`:''}
          ${exch?`<span class="co-badge">${exch}</span>`:''}
          ${ceo?`<span class="co-badge">CEO: ${ceo}</span>`:''}
          ${emp?`<span class="co-badge">👥 ${emp}</span>`:''}
        </div>
      </div>
      <div class="co-price-block">
        <div class="co-price">$${price||'—'}</div>
        <div class="co-chg ${isUp?'up':'dn'}">${isUp?'▲':'▼'} ${chgPct||''} (${chgAmt||''})</div>
        <div class="co-mktcap">שווי שוק: ${mktcap||'—'}</div>
      </div>
    </div>
    ${nextDate?`<div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:7px;padding:5px 12px;margin-top:2px"><span style="font-size:11px;color:#e2e8f0">📅 דוח הבא:</span><span style="font-size:12px;font-weight:700;color:#fff">${nextDate}</span><span style="font-size:11px;color:#93c5fd">${nextPer||''}</span>${nextIn?`<span style="font-size:10px;background:rgba(255,255,255,.15);border-radius:10px;padding:1px 7px;color:#fff">${nextIn}</span>`:''}</div>`:''}
  </div>`;

  // Performance bars
  if(perfs.length){
    const maxAbs = Math.max(...perfs.map(p=>Math.abs(parseFloat(p.v)||0)),0.01);
    html += `<div class="co-perf"><div class="co-perf-title">ביצועי מחיר</div><div class="co-perf-bars" dir="ltr">`;
    perfs.forEach(p=>{
      const v=parseFloat(p.v)||0;const pct2=Math.abs(v)/maxAbs;const h=Math.round(pct2*46)+4;
      const cls=v>=0?'pos-b':'neg-b';const vcls=v>=0?'pos':'neg';
      html+=`<div class="co-bar-wrap"><div class="co-bar-val ${vcls}">${v>0?'+':''}${v.toFixed(1)}%</div><div class="co-bar-outer"><div class="co-bar ${cls}" style="height:${h}px"></div></div><div class="co-bar-lbl">${p.l}</div></div>`;
    });
    html += `</div></div>`;
  }

  // 52W range
  if(hi52 && lo52 && price){
    const hiN=parseFloat(hi52),loN=parseFloat(lo52),curN=parseFloat(price);
    const posP=hiN>loN?((curN-loN)/(hiN-loN)*100).toFixed(1):pos52||'50';
    html += `<div class="co-range-wrap"><div class="co-range-title">טווח 52 שבועות</div>
      <div class="co-range-track" dir="ltr">
        <div class="co-range-fill" style="width:100%"></div>
        <div class="co-range-dot" style="left:${posP}%"></div>
      </div>
      <div class="co-range-labels"><span>📉 $${lo52}</span><span>$${price}</span><span>📈 $${hi52}</span></div>
      <div class="co-range-current">מיקום: ${posP}% מהטווח השנתי • MA50: ${ma50} • MA200: ${ma200}</div>
    </div>`;
  }

  // Key metrics
  const metricsToShow=[
    {l:'P/E',v:pe},{l:'ROE',v:roe},{l:'ROA',v:roa},{l:'ROIC',v:roic},
    {l:'Current Ratio',v:cr},{l:'EV/EBITDA',v:evEbt},{l:'Net Margin',v:npm},{l:'Working Capital',v:wc}
  ].filter(m=>m.v);
  if(metricsToShow.length){
    html += `<div class="co-metrics">`;
    metricsToShow.slice(0,8).forEach(m=>{
      html+=`<div class="co-metric"><div class="co-metric-lbl">${m.l}</div><div class="co-metric-val">${m.v}</div></div>`;
    });
    html += `</div>`;
  }

  // Analyst ratings
  if(totalAn > 1){
    const bullPct = ((strongBuy+buyN)/totalAn*100).toFixed(0);
    const holdPct = (holdN/totalAn*100).toFixed(0);
    const bearPct = ((sellN+strSell)/totalAn*100).toFixed(0);
    const ptNum = ptCons?parseFloat(ptCons.replace(/[$,]/g,'')):0;
    const curNum = parseFloat(price||'0');
    const upside = ptNum&&curNum?(((ptNum-curNum)/curNum)*100).toFixed(1):'';
    html += `<div class="co-analyst"><div class="stitle" style="margin-top:0">📊 המלצות אנליסטים (${totalAn} אנליסטים)</div>
      <div class="co-analyst-row">
        <div class="co-consensus">
          <div class="co-consensus-badge ${['Hold','Sell','Strong Sell'].includes(consensus)?consensus:''}">${consensus||'—'}</div>
          <div class="co-consensus-lbl">קונצנזוס</div>
        </div>
        <div class="co-dist">
          ${[['קנייה חזקה',strongBuy,'#16a34a'],['קנייה',buyN,'#4ade80'],['החזקה',holdN,'#f59e0b'],['מכירה',sellN,'#f87171'],['מכירה חזקה',strSell,'#dc2626']].map(([l,c,col])=>
            `<div class="co-dist-row"><span class="co-dist-lbl">${l}</span><div class="co-dist-bar-bg"><div class="co-dist-bar-fill" style="width:${(c/totalAn*100).toFixed(0)}%;background:${col}"></div></div><span class="co-dist-cnt">${c}</span></div>`
          ).join('')}
        </div>
        ${ptCons?`<div class="co-pt"><div class="co-pt-lbl">יעד מחיר</div><div class="co-pt-val">${ptCons}</div>${upside?`<div class="co-pt-upside">▲ ${upside}% פוטנציאל</div>`:''}<div style="font-size:9.5px;color:#9ca3af;margin-top:4px">גבוה: ${ptHigh||'—'} | נמוך: ${ptLow||'—'}</div></div>`:''}
      </div>
    </div>`;
  }

  // Latest earnings
  if(epsAct||revAct){
    const epsSurpV=parseFloat((epsSurp||'').replace('%',''));
    const revSurpV=parseFloat((revSurp||'').replace('%',''));
    html += `<div class="co-earnings-wrap"><div class="stitle" style="margin-top:0">📋 דוח אחרון — ${repPer||''}</div>
      <div class="co-earnings-row">
        ${epsAct?`<div class="co-earn-box ${epsSurpV<0?'miss':''}">
          <div class="co-earn-title">EPS — רווח למניה</div>
          <div class="co-earn-actual">${epsAct}</div>
          <div class="co-earn-est">תחזית: ${epsEst||'—'}</div>
          <div class="co-earn-surp ${epsSurpV>=0?'pos':'neg'}">${epsSurpV>=0?'▲ עבר':'▼ פספס'} ב-${epsSurp||'—'}</div>
        </div>`:''}
        ${revAct?`<div class="co-earn-box ${revSurpV<0?'miss':''}">
          <div class="co-earn-title">הכנסות</div>
          <div class="co-earn-actual">${revAct}</div>
          <div class="co-earn-est">תחזית: ${revEst||'—'}</div>
          <div class="co-earn-surp ${revSurpV>=0?'pos':'neg'}">${revSurpV>=0?'▲ עבר':'▼ פספס'} ב-${revSurp||'—'}</div>
        </div>`:''}
      </div>
    </div>`;
  }

  // Revenue segments
  if(revProdRows.length){
    const quarters=Object.keys(revProdRows[0]).filter(k=>k!=='Segment');
    const latestQ=quarters[0]||'';
    const vals=revProdRows.map(r=>({name:r['Segment']||r['SEGMENT']||'',val:r[latestQ]||''})).filter(x=>x.name&&x.val&&x.val!=='-');
    if(vals.length){
      const maxVal=Math.max(...vals.map(v=>parseRevVal(v.val)),0.01);
      html += `<div class="co-rev-wrap"><div class="stitle" style="margin-top:0">📦 הכנסות לפי מוצר — ${latestQ}</div>`;
      vals.sort((a,b)=>parseRevVal(b.val)-parseRevVal(a.val)).forEach(v=>{
        const pct2=(parseRevVal(v.val)/maxVal*100).toFixed(0);
        html+=`<div class="co-rev-row"><div class="co-rev-lbl">${v.name}</div><div class="co-rev-bar-bg" dir="ltr"><div class="co-rev-bar-fill" style="width:${pct2}%"></div></div><div class="co-rev-val">${v.val}</div></div>`;
      });
      html += `</div>`;
    }
  }

  // ESG
  if(esgCur['ESG Score']){
    html += `<div class="co-esg">
      <div class="co-esg-box" style="flex:2;text-align:right">
        <div style="font-size:11px;font-weight:700;color:#4a5568;margin-bottom:4px">ESG — ניקוד קיימות (${esgCur['Year']||''})</div>
        <div style="font-size:10px;color:#718096">${esgCur['Performance']||''}</div>
      </div>
      ${[['כללי',esgCur['ESG Score']],['סביבה',esgCur['Environmental Score']],['חברה',esgCur['Social Score']],['ממשל',esgCur['Governance Score']]].filter(([,v])=>v).map(([l,v])=>
        `<div class="co-esg-box"><div class="co-esg-lbl">${l}</div><div class="co-esg-score">${parseFloat(v).toFixed(0)}</div></div>`
      ).join('')}
    </div>`;
  }

  html += `</div>`; // close co-card
  return html;
}

function parseRevVal(s){
  if(!s||s==='-') return 0;
  const m=s.match(/([\d.]+)\s*([BKMT]?)/i);
  if(!m) return 0;
  const n=parseFloat(m[1]);
  const u=m[2].toUpperCase();
  return n*(u==='B'?1e9:u==='M'?1e6:u==='K'?1e3:1);
}

// ── Debug ─────────────────────────────────────────────────────────────────────
function toggleDbg(){const d=document.getElementById('dbg');d.style.display=d.style.display==='none'?'block':'none';}

// ── Boot ──────────────────────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
