# ── Build settings ────────────────────────────────────────────────────────────
[build]
  publish   = "."                  # index.html lives in the root
  functions = "netlify/functions"  # serverless functions folder

[build.environment]
  NODE_VERSION = "18"              # ensures global fetch is available

# ── Functions ─────────────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"         # fast, tree-shaking bundler

# ── Dev server (netlify dev) ──────────────────────────────────────────────────
[dev]
  port    = 8888
  publish = "."

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Cache: static assets ──────────────────────────────────────────────────────
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Short-lived cache for function responses ──────────────────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=30"
