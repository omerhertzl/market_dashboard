# ── Build ─────────────────────────────────────────────────────────────────────
[build]
  publish   = "."
  functions = "netlify/functions"
  command   = "npm install"          # installs yahoo-finance2 & axios before deploy

[build.environment]
  NODE_VERSION = "18"

# ── Functions ─────────────────────────────────────────────────────────────────
[functions]
  node_bundler              = "esbuild"
  external_node_modules     = ["yahoo-finance2"]   # don't bundle — use installed package

# ── Local dev  (run: netlify dev) ─────────────────────────────────────────────
[dev]
  port       = 8888
  targetPort = 3000
  publish    = "."

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline'; img-src * data:; connect-src *"

# ── Cache: function responses (60 s fresh, 30 s stale) ───────────────────────
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, s-maxage=60, stale-while-revalidate=30"
